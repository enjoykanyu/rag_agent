<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent — 多源文档智能问答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --bg-elevated: #ffffff;
            --bg-hover: #f0f0f2;
            --border: #e5e5e7;
            --border-light: #ededed;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --accent: #0071e3;
            --accent-light: #e8f4fd;
            --accent-hover: #0077ed;
            --red: #ff3b30;
            --green: #34c759;
            --orange: #ff9500;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-elevated);
            box-shadow: var(--shadow);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: -2px;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            position: relative;
            overflow: hidden;
        }

        .header-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,113,227,0.08) 0%, rgba(0,113,227,0.02) 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .header-btn:hover {
            border-color: rgba(0,113,227,0.3);
            color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,113,227,0.12), 0 1px 3px rgba(0,0,0,0.04);
        }

        .header-btn:hover::before {
            opacity: 1;
        }

        .header-btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 3px rgba(0,113,227,0.08);
        }

        .header-btn.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .header-btn.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 14px rgba(0,113,227,0.3), 0 1px 3px rgba(0,0,0,0.06);
        }

        .header-btn.primary::before {
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Empty State */
        .chat-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .chat-empty-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .chat-empty h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .chat-empty p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }

        .quick-chip {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-chip:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Messages */
        .msg {
            margin-bottom: 20px;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            display: flex;
            justify-content: flex-end;
        }

        .msg-user .msg-bubble {
            background: var(--accent);
            color: white;
            border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
            padding: 10px 16px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.6;
        }

        .msg-assistant {
            display: flex;
            gap: 10px;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-content p {
            margin-bottom: 8px;
        }

        .msg-content p:last-child {
            margin-bottom: 0;
        }

        /* Thinking Block */
        .thinking-block {
            margin-bottom: 10px;
        }

        .thinking-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .thinking-toggle:hover {
            background: var(--bg-hover);
        }

        .thinking-toggle .think-icon {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        .thinking-toggle .think-icon.done {
            animation: none;
            border: none;
            width: auto;
            height: auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .thinking-toggle .chevron {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .thinking-toggle.expanded .chevron {
            transform: rotate(180deg);
        }

        .thinking-body {
            margin-top: 8px;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            font-family: 'JetBrains Mono', monospace;
        }

        /* References Bar */
        .refs-bar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--accent-light);
            border: 1px solid rgba(0,113,227,0.15);
            border-radius: 8px;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .refs-bar:hover {
            background: rgba(0,113,227,0.1);
        }

        .refs-bar .ref-count {
            font-weight: 600;
        }

        /* Reference Panel */
        .refs-panel {
            margin-bottom: 12px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            animation: fadeIn 0.3s ease;
        }

        .refs-panel-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .ref-item {
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .ref-item:last-child {
            margin-bottom: 0;
        }

        .ref-item:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .ref-doc-name {
            font-weight: 600;
            color: var(--accent);
            font-size: 13px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ref-doc-name .ref-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            background: var(--accent-light);
            border: 1px solid rgba(0,113,227,0.2);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
        }

        .ref-section-path {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .ref-snippet {
            color: var(--text);
            line-height: 1.6;
            font-size: 12px;
            padding: 8px 10px;
            background: var(--bg);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }

        .ref-meta {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
        }

        /* Answer Text with inline citations */
        .answer-text {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
        }

        .answer-text .cite-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            background: var(--accent-light);
            border: 1px solid rgba(0,113,227,0.2);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            vertical-align: super;
            margin-left: 1px;
            transition: all 0.15s;
        }

        .answer-text .cite-link:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .answer-text .no-context {
            color: var(--red);
            font-weight: 500;
        }

        .answer-text h1, .answer-text h2, .answer-text h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 14px 0 8px;
            color: var(--text);
        }

        .answer-text h1 { font-size: 17px; }
        .answer-text h2 { font-size: 15px; }
        .answer-text h3 { font-size: 14px; }

        .answer-text ul, .answer-text ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .answer-text li {
            margin-bottom: 4px;
            line-height: 1.7;
        }

        .answer-text code {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
        }

        .answer-text pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px 0;
            overflow-x: auto;
        }

        .answer-text pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 12px;
            color: var(--text);
        }

        .answer-text p {
            margin: 6px 0;
        }

        .answer-text strong {
            font-weight: 600;
        }

        .answer-text em {
            font-style: italic;
        }

        .answer-text hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        .follow-hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Loading */
        .loading-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .loading-dots {
            display: flex;
            gap: 3px;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Input Area */
        .input-area {
            padding: 12px 24px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 8px 12px;
            transition: all 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-box textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
            min-height: 20px;
            padding: 4px 0;
        }

        .input-box textarea::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }

        .input-btn:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .input-btn.send {
            background: var(--accent);
            color: white;
        }

        .input-btn.send:hover {
            background: var(--accent-hover);
        }

        .input-btn.send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-left: 4px;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            gap: 16px;
            padding: 6px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg);
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
        }

        /* Upload overlay */
        .upload-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .upload-overlay.active {
            display: flex;
        }

        .upload-modal {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 28px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 8px 24px rgba(0,0,0,0.08);
            animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .upload-modal h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-modal .modal-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .upload-dropzone {
            display: block;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(180deg, rgba(0,113,227,0.02) 0%, rgba(0,113,227,0) 100%);
            position: relative;
            overflow: hidden;
        }

        .upload-dropzone::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: radial-gradient(circle at center, rgba(0,113,227,0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-dropzone:hover {
            border-color: var(--accent);
            background: linear-gradient(180deg, rgba(0,113,227,0.06) 0%, rgba(0,113,227,0.02) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,113,227,0.1);
        }

        .upload-dropzone:hover::before {
            opacity: 1;
        }

        .upload-dropzone:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0,113,227,0.06);
        }

        .upload-dropzone input {
            display: none;
        }

        .upload-dropzone .upload-icon-wrap {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent-light) 0%, rgba(0,113,227,0.08) 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .upload-dropzone:hover .upload-icon-wrap {
            transform: scale(1.08);
            background: linear-gradient(135deg, rgba(0,113,227,0.12) 0%, rgba(0,113,227,0.06) 100%);
        }

        .upload-dropzone .upload-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .upload-dropzone .upload-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }

        .upload-dropzone .upload-status {
            font-size: 12px;
            margin-top: 10px;
            font-weight: 500;
            min-height: 18px;
            position: relative;
            z-index: 1;
        }

        .upload-dropzone .upload-status.success {
            color: var(--green);
        }

        .upload-dropzone .upload-status.error {
            color: var(--red);
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="header-logo">R</div>
                <div>
                    <div class="header-title">RAG Agent</div>
                    <div class="header-subtitle">多源文档智能问答</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="showUpload()">📎 上传文档</button>
                <button class="header-btn" onclick="resetConversation()">↺ 重置</button>
                <button class="header-btn" onclick="reindex()">⟳ 重新索引</button>
            </div>
        </header>

        <div class="chat-area" id="chatContainer">
            <div class="chat-empty" id="chatEmpty">
                <div class="chat-empty-icon">📚</div>
                <h2>向知识库提问</h2>
                <p>Agent 将检索文档并生成带引用的回答</p>
                <div class="quick-chips">
                    <button class="quick-chip" onclick="quickAsk('Python 有哪些基本数据类型？')">Python 有哪些基本数据类型？</button>
                    <button class="quick-chip" onclick="quickAsk('如何使用装饰器？请举例说明')">如何使用装饰器？</button>
                    <button class="quick-chip" onclick="quickAsk('Python 的列表推导式怎么写？')">列表推导式怎么写？</button>
                    <button class="quick-chip" onclick="quickAsk('法国的首都是哪里？')">法国的首都在哪？</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="questionInput" rows="1" placeholder="输入你的问题，按 Enter 发送..." onkeydown="handleKeydown(event)"></textarea>
                <div class="input-actions">
                    <button class="input-btn send" id="sendBtn" onclick="askQuestion()">➤</button>
                </div>
            </div>
            <div class="input-hint">支持多轮追问 · 知识库外问题将被拒绝回答</div>
        </div>

        <div class="status-bar">
            <div class="status-item"><span class="status-dot"></span> 服务正常</div>
            <div class="status-item">📄 <span id="docCount">—</span> 文档</div>
            <div class="status-item">🧩 <span id="chunkCount">—</span> 文本块</div>
            <div class="status-item">🔧 <span id="embType">—</span></div>
            <div class="status-item">🤖 <span id="llmModel">—</span></div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="upload-overlay" id="uploadOverlay" onclick="hideUpload(event)">
        <div class="upload-modal" onclick="event.stopPropagation()">
            <h3>📎 上传文档到知识库</h3>
            <div class="modal-subtitle">支持 Markdown 和纯文本文件</div>
            <label class="upload-dropzone">
                <input type="file" id="fileUpload" accept=".md,.txt" onchange="uploadFile()" />
                <div class="upload-icon-wrap">📄</div>
                <div class="upload-text">点击选择 .md / .txt 文件</div>
                <div class="upload-hint">或将文件拖拽到此处</div>
                <div class="upload-status" id="uploadStatus"></div>
            </label>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatEmpty = document.getElementById('chatEmpty');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // Auto-resize textarea
        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        }

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('docCount').textContent = data.documents;
                document.getElementById('chunkCount').textContent = data.chunks;
                document.getElementById('embType').textContent = data.embedding;
                document.getElementById('llmModel').textContent = data.llm_model;
            } catch (e) {}
        }

        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            questionInput.value = '';
            questionInput.style.height = 'auto';
            chatEmpty.style.display = 'none';
            appendUserMsg(question);

            const assistantId = 'assistant-' + Date.now();
            appendAssistantPlaceholder(assistantId);

            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('question', question);

                const response = await fetch('/api/ask', {
                    method: 'POST',
                    body: formData,
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                let currentRefs = [];
                let thinkingShown = false;
                let refsShown = false;
                let streamingAnswer = '';
                let isStreaming = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const block of lines) {
                        if (!block.trim()) continue;
                        const event = parseSSE(block);
                        if (!event) continue;

                        if (event.type === 'thinking') {
                            updateThinking(assistantId, event.data.content, event.data.ms, true);
                            thinkingShown = true;
                        } else if (event.type === 'thinking_end') {
                            updateThinking(assistantId, null, event.data.ms, false);
                        } else if (event.type === 'references') {
                            currentRefs = event.data.items;
                            updateReferences(assistantId, event.data.count, currentRefs);
                            refsShown = true;
                        } else if (event.type === 'answer_start') {
                            isStreaming = true;
                            streamingAnswer = '';
                            startStreamingAnswer(assistantId, event.data.has_context);
                        } else if (event.type === 'answer_token') {
                            streamingAnswer += event.data.token;
                            updateStreamingAnswer(assistantId, streamingAnswer, currentRefs);
                        } else if (event.type === 'answer_end') {
                            isStreaming = false;
                            finalizeStreamingAnswer(assistantId, streamingAnswer, event.data.follow_up_hint, currentRefs);
                        } else if (event.type === 'answer') {
                            updateAnswer(assistantId, event.data.content, event.data.has_context, event.data.follow_up_hint, currentRefs);
                        } else if (event.type === 'done') {
                            // 完成
                        } else if (event.type === 'error') {
                            updateAnswer(assistantId, '错误: ' + event.data.message, false, '', []);
                        }
                    }
                }
            } catch (e) {
                updateAnswer(assistantId, '请求失败，请检查服务是否正常运行。', false, '', []);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function parseSSE(block) {
            const lines = block.split('\n');
            let eventType = '';
            let data = '';
            for (const line of lines) {
                if (line.startsWith('event: ')) {
                    eventType = line.slice(7);
                } else if (line.startsWith('data: ')) {
                    data = line.slice(6);
                }
            }
            if (!eventType || !data) return null;
            try {
                return { type: eventType, data: JSON.parse(data) };
            } catch {
                return null;
            }
        }

        function quickAsk(question) {
            questionInput.value = question;
            askQuestion();
        }

        function appendUserMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg msg-user';
            div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendAssistantPlaceholder(id) {
            const div = document.createElement('div');
            div.className = 'msg msg-assistant';
            div.id = id;
            div.innerHTML = `
                <div class="msg-avatar">A</div>
                <div class="msg-content">
                    <div class="loading-msg">
                        <div class="loading-dots"><span></span><span></span><span></span></div>
                        正在检索知识库...
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function updateThinking(id, content, ms, isThinking) {
            const msg = document.getElementById(id);
            if (!msg) return;
            const contentDiv = msg.querySelector('.msg-content');

            let thinkBlock = contentDiv.querySelector('.thinking-block');
            if (!thinkBlock) {
                thinkBlock = document.createElement('div');
                thinkBlock.className = 'thinking-block';
                contentDiv.insertBefore(thinkBlock, contentDiv.firstChild);
            }

            const seconds = (ms / 1000).toFixed(1);
            const icon = isThinking
                ? '<span class="think-icon"></span>'
                : '<span class="think-icon done">✓</span>';
            const label = isThinking
                ? '深度思考中...'
                : `已深度思考（用时 ${seconds} 秒）`;

            thinkBlock.innerHTML = `
                <button class="thinking-toggle ${content ? 'expanded' : ''}" onclick="toggleThinking(this)">
                    ${icon}
                    <span>${label}</span>
                    <span class="chevron">▼</span>
                </button>
                ${content ? `<div class="thinking-body">${escapeHtml(content)}</div>` : ''}
            `;
            scrollToBottom();
        }

        function toggleThinking(btn) {
            btn.classList.toggle('expanded');
            const body = btn.nextElementSibling;
            if (body) {
                body.style.display = body.style.display === 'none' ? 'block' : 'none';
            }
        }

        function updateReferences(id, count, refs) {
            const msg = document.getElementById(id);
            if (!msg) return;
            const contentDiv = msg.querySelector('.msg-content');

            // Remove loading
            const loading = contentDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            let refsBar = contentDiv.querySelector('.refs-bar');
            if (!refsBar) {
                refsBar = document.createElement('button');
                refsBar.className = 'refs-bar';
                refsBar.onclick = function() { toggleRefs(this); };
                contentDiv.appendChild(refsBar);
            }
            refsBar.innerHTML = `📎 <span class="ref-count">${count}</span> 个引用内容 <span style="font-size:10px">▼</span>`;
            refsBar.dataset.refs = JSON.stringify(refs);
            scrollToBottom();
        }

        function toggleRefs(btn) {
            const contentDiv = btn.parentElement;
            let panel = contentDiv.querySelector('.refs-panel');

            if (panel) {
                panel.remove();
                btn.querySelector('span:last-child').textContent = '▼';
                return;
            }

            const refs = JSON.parse(btn.dataset.refs || '[]');
            panel = document.createElement('div');
            panel.className = 'refs-panel';

            let html = '<div class="refs-panel-title">引用来源</div>';
            for (const ref of refs) {
                const docName = ref.document_name || ref.source;
                const sectionPart = ref.section ? escapeHtml(ref.section) : '';
                html += `
                    <div class="ref-item">
                        <div class="ref-doc-name"><span class="ref-index">${ref.index}</span>${escapeHtml(docName)}</div>
                        ${sectionPart ? `<div class="ref-section-path">${sectionPart}</div>` : ''}
                        <div class="ref-snippet">${escapeHtml(ref.snippet)}</div>
                        <div class="ref-meta">相似度: ${ref.score}</div>
                    </div>
                `;
            }
            panel.innerHTML = html;
            contentDiv.appendChild(panel);
            btn.querySelector('span:last-child').textContent = '▲';
            scrollToBottom();
        }

        function closeIncompleteMarkdown(text) {
            let safe = text;
            const fenceMatches = safe.match(/```/g);
            if (fenceMatches && fenceMatches.length % 2 !== 0) {
                safe += '\n```';
            }
            const lines = safe.split('\n');
            let inTable = false;
            let tableRows = 0;
            for (let i = 0; i < lines.length; i++) {
                if (/^\|/.test(lines[i])) {
                    if (!inTable) { inTable = true; tableRows = 0; }
                    tableRows++;
                } else if (inTable) {
                    if (tableRows < 2) {
                        lines[i - 1] += '\n|---|';
                    }
                    inTable = false;
                }
            }
            if (inTable && tableRows < 2) {
                lines.push('|---|');
            }
            safe = lines.join('\n');
            return safe;
        }

        function renderMarkdownWithCitations(text, refs) {
            let html = marked.parse(closeIncompleteMarkdown(text));
            const codeBlockRegex = /(<code>[\s\S]*?<\/code>|<pre>[\s\S]*?<\/pre>)/g;
            let parts = html.split(codeBlockRegex);
            for (let i = 0; i < parts.length; i++) {
                if (parts[i].startsWith('<code>') || parts[i].startsWith('<pre>')) continue;
                parts[i] = parts[i].replace(/\[(\d+)\]/g, (match, num) => {
                    const ref = refs.find(r => r.index === parseInt(num));
                    if (ref) {
                        const docName = ref.document_name || ref.source;
                        const sectionPart = ref.section || '';
                        return `<span class="cite-link" onclick="showRefTooltip(this, ${num}, '${escapeHtml(docName)}', '${escapeHtml(ref.snippet)}', '${escapeHtml(sectionPart)}')">${num}</span>`;
                    }
                    return match;
                });
            }
            html = parts.join('');
            return html;
        }

        function updateAnswer(id, content, hasContext, followUp, refs) {
            const msg = document.getElementById(id);
            if (!msg) return;
            const contentDiv = msg.querySelector('.msg-content');

            const loading = contentDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            let formattedContent = renderMarkdownWithCitations(content, refs);

            let html = '';
            if (!hasContext) html += `<div class="answer-text"><span class="no-context">${formattedContent}</span></div>`;
            else html += `<div class="answer-text">${formattedContent}</div>`;
            if (followUp) html += `<div class="follow-hint">${escapeHtml(followUp)}</div>`;

            let answerDiv = contentDiv.querySelector('.answer-text');
            if (answerDiv) {
                answerDiv.outerHTML = html;
            } else {
                contentDiv.insertAdjacentHTML('beforeend', html);
            }
            scrollToBottom();
        }

        function startStreamingAnswer(id, hasContext) {
            const msg = document.getElementById(id);
            if (!msg) return;
            const contentDiv = msg.querySelector('.msg-content');
            const loading = contentDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            const cursor = document.createElement('span');
            cursor.className = 'stream-cursor';
            cursor.style.cssText = 'display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;animation:blink 0.8s infinite;vertical-align:text-bottom;';
            const answerDiv = document.createElement('div');
            answerDiv.className = 'answer-text';
            answerDiv.id = id + '-stream';
            answerDiv.appendChild(cursor);
            contentDiv.appendChild(answerDiv);
            scrollToBottom();
        }

        function updateStreamingAnswer(id, text, refs) {
            const answerDiv = document.getElementById(id + '-stream');
            if (!answerDiv) return;

            let html = renderMarkdownWithCitations(text, refs);

            const cursor = answerDiv.querySelector('.stream-cursor');
            answerDiv.innerHTML = html;
            if (cursor) answerDiv.appendChild(cursor);
            else {
                const newCursor = document.createElement('span');
                newCursor.className = 'stream-cursor';
                newCursor.style.cssText = 'display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;animation:blink 0.8s infinite;vertical-align:text-bottom;';
                answerDiv.appendChild(newCursor);
            }
            scrollToBottom();
        }

        function finalizeStreamingAnswer(id, text, followUp, refs) {
            const answerDiv = document.getElementById(id + '-stream');
            if (!answerDiv) return;
            answerDiv.removeAttribute('id');

            let html = renderMarkdownWithCitations(text, refs);
            answerDiv.innerHTML = html;
            if (followUp) {
                const hint = document.createElement('div');
                hint.className = 'follow-hint';
                hint.textContent = followUp;
                answerDiv.parentElement.appendChild(hint);
            }
            scrollToBottom();
        }

        function showRefTooltip(el, index, source, snippet, section) {
            document.querySelectorAll('.ref-tooltip').forEach(t => t.remove());

            const ref = currentRefs && currentRefs.find(r => r.index === index);
            const docName = source;
            const sectionPart = section || (ref && ref.section ? ref.section : '');

            const rect = el.getBoundingClientRect();
            const tooltip = document.createElement('div');
            tooltip.className = 'ref-tooltip';
            tooltip.style.cssText = `
                position: fixed;
                left: ${Math.min(rect.left, window.innerWidth - 360)}px;
                top: ${rect.bottom + 8}px;
                background: white;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 0;
                box-shadow: 0 4px 16px rgba(0,0,0,0.12);
                max-width: 360px;
                z-index: 1000;
                font-size: 13px;
                overflow: hidden;
            `;

            const sectionHtml = sectionPart
                ? `<div style="color:var(--text-secondary);font-size:11px;margin-bottom:8px;padding:0 12px;">${escapeHtml(sectionPart)}</div>`
                : '';

            tooltip.innerHTML = `
                <div style="font-weight:600;color:var(--accent);font-size:14px;padding:10px 12px 6px;border-bottom:1px solid var(--border-light);background:var(--bg);">${escapeHtml(docName)}</div>
                ${sectionHtml}
                <div style="color:var(--text);line-height:1.7;padding:10px 12px 12px;background:white;">${escapeHtml(snippet)}</div>
            `;
            document.body.appendChild(tooltip);

            // Auto remove after 5s or on click elsewhere
            setTimeout(() => tooltip.remove(), 5000);
            document.addEventListener('click', function remove(e) {
                if (!tooltip.contains(e.target) && e.target !== el) {
                    tooltip.remove();
                    document.removeEventListener('click', remove);
                }
            });
        }

        async function resetConversation() {
            await fetch('/api/reset', { method: 'POST' });
            chatContainer.innerHTML = '';
            chatContainer.appendChild(chatEmpty);
            chatEmpty.style.display = 'flex';
        }

        async function reindex() {
            const res = await fetch('/api/reindex', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            loadStatus();
        }

        function showUpload() {
            document.getElementById('uploadOverlay').classList.add('active');
        }

        function hideUpload(e) {
            if (e.target === document.getElementById('uploadOverlay')) {
                document.getElementById('uploadOverlay').classList.remove('active');
            }
        }

        async function uploadFile() {
            const input = document.getElementById('fileUpload');
            const statusEl = document.getElementById('uploadStatus');
            if (!input.files.length) return;

            const formData = new FormData();
            formData.append('file', input.files[0]);

            statusEl.textContent = '上传中...';
            statusEl.className = 'upload-status';
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    statusEl.textContent = `✓ ${data.message}`;
                    statusEl.className = 'upload-status success';
                    setTimeout(() => {
                        document.getElementById('uploadOverlay').classList.remove('active');
                        statusEl.textContent = '';
                        statusEl.className = 'upload-status';
                        input.value = '';
                    }, 1500);
                } else {
                    statusEl.textContent = `✗ ${data.error}`;
                    statusEl.className = 'upload-status error';
                }
            } catch (e) {
                statusEl.textContent = '✗ 上传失败';
                statusEl.className = 'upload-status error';
            }
            loadStatus();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadStatus();
    </script>
</body>
</html>
